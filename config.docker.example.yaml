ports:
  - "22"
  - "443"

protocol: TCP
rule_description: "auto-ddns-whitelist"
remove_old_ip: true

ip_check:
  urls:
    - "https://ddns.oray.com/checkip"
    - "https://4.ipw.cn"
  interval_seconds: 300

state_file: "/data/state.json"

targets:
  tencent_lighthouse:
    enabled: true
    region: "ap-guangzhou"
    secret_id: "AKIDxxxxxxxx"
    secret_key: "xxxxxxxxxxxxxxxx"
    instance_id: "lhins-xxxxxxxx"

  aliyun_swas:
    enabled: true
    region: "us-east-1"
    access_key_id: "LTAIxxxxxxxx"
    access_key_secret: "xxxxxxxxxxxxxxxx"
    instance_id: "your-instance-id"

  aws_lightsail:
    enabled: false
    provider: aws_lightsail
    region: "us-east-1"
    access_key_id: "AKIAxxxxxxxx"
    access_key_secret: "xxxxxxxxxxxxxxxx"
    instance_name: "MyLightsailInstance"

  volcengine_sg:
    enabled: false
    provider: volcengine_security_group
    region: "cn-beijing"
    access_key_id: "AKLTxxxxxxxx"
    access_key_secret: "xxxxxxxxxxxxxxxx"
    security_group_id: "sg-xxxxxxxxxxxxxxxx"

  hetzner_cloud:
    enabled: false
    provider: hetzner_cloud_firewall
    api_token: "your-hcloud-token"
    firewall_id: "12345"

  hetzner_dedicated:
    enabled: false
    provider: hetzner_robot_firewall
    robot_user: "your-robot-user"
    robot_password: "your-robot-password"
    server_number: "321"

  scaleway_vps:
    enabled: false
    provider: scaleway_security_group
    zone: "fr-par-1"
    secret_key: "scw-secret-key"
    security_group_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
