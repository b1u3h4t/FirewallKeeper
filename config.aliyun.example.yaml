# 阿里云国际版轻量 (Simple Application Server) 配置示例
# cp config.aliyun.example.yaml config.yaml

aliyun:
  access_key_id: "LTAIxxxxxxxx"
  access_key_secret: "xxxxxxxxxxxxxxxx"
  region: "us-east-1"

backend: aliyun_swas

aliyun_swas:
  instance_id: "your-instance-id"

ports:
  - "22"
  - "443"

protocol: TCP
rule_description: "auto-ddns-whitelist"
remove_old_ip: true

ip_check:
  urls:
    - "https://ddns.oray.com/checkip"
    - "https://4.ipw.cn"
  interval_seconds: 300

state_file: "/data/state.json"
