# 仅阿里云 SWAS 示例（也可与腾讯云 targets 写在同一 config.yaml）
ports:
  - "22"
  - "443"

protocol: TCP
remove_old_ip: true

targets:
  aliyun_swas:
    enabled: true
    region: "us-east-1"
    access_key_id: "LTAIxxxxxxxx"
    access_key_secret: "xxxxxxxxxxxxxxxx"
    instance_id: "your-instance-id"

state_file: "/data/state.json"
