# 复制为 config.yaml
# 可同时启用多个云厂商目标，IP 变更时会依次更新全部 enabled: true 的 targets

ports:
  - "22"
  - "443"
  - "6000"
# 也可写成单条多端口（腾讯轻量/CVM 会自动把列表合并成一条规则，例如 22,443,6000）：
# ports: ["22,443,6000-6002"]

protocol: TCP
rule_description: "auto-ddns-whitelist"
remove_old_ip: true

ip_check:
  urls:
    - "https://ddns.oray.com/checkip"
    - "https://4.ipw.cn"
  interval_seconds: 300

state_file: "~/.cache/FirewallKeeper/state.json"

# ---------- 多厂商目标（推荐）----------
targets:
  # 腾讯云轻量
  tencent_lighthouse:
    enabled: true
    region: "ap-beijing"
    secret_id: "AKIDxxx"
    secret_key: "xxx"
    instance_id: "lhins-xxxx"

  # 腾讯云 CVM 安全组（不需要可设 enabled: false 或删除整段）
  tencent_cvm:
    enabled: false
    region: "ap-beijing"
    secret_id: "AKIDxxx"
    secret_key: "xxx"
    security_group_id: "sg-xxxx"

  # 阿里云国际版 Simple Application Server
  aliyun_swas:
    enabled: true
    region: "us-east-1"
    access_key_id: "LTAIxxx"
    access_key_secret: "xxx"
    instance_id: "your-instance-id"

  # AWS Lightsail 实例防火墙
  aws_lightsail:
    enabled: false
    provider: aws_lightsail
    region: "us-east-1"
    access_key_id: "AKIAxxxxxxxx"
    access_key_secret: "xxxxxxxxxxxxxxxx"
    instance_name: "MyLightsailInstance"   # 控制台中的实例名称

  # 火山引擎 ECS 安全组
  volcengine_sg:
    enabled: false
    provider: volcengine_security_group
    region: "cn-beijing"
    access_key_id: "AKLTxxxxxxxx"
    access_key_secret: "xxxxxxxxxxxxxxxx"
    security_group_id: "sg-xxxxxxxxxxxxxxxx"

  # Hetzner Cloud 防火墙（云 VPS，需已创建并绑定到服务器的 Firewall）
  hetzner_cloud:
    enabled: false
    provider: hetzner_cloud_firewall
    api_token: "your-hcloud-token"
    firewall_id: "12345"

  # Hetzner Robot 防火墙（独立服务器 / Dedicated）
  hetzner_dedicated:
    enabled: false
    provider: hetzner_robot_firewall
    robot_user: "your-robot-user"
    robot_password: "your-robot-password"
    server_number: "321"   # Robot 中的 Server ID

  # Netcup SCP 防火墙策略（参考 netcup-cli / SCP REST API）
  netcup_vps:
    enabled: false
    provider: netcup_scp_firewall
    refresh_token: "your-scp-refresh-token"   # netcup auth login 后 ~/.config/netcup-cli/credentials
    firewall_policy_id: "42"                # 控制台防火墙策略 ID
    # user_id: "123"                        # 可选，默认从 OAuth userinfo 获取
    # server_id: "100"                      # 可选，填写后更新策略后会 reapply 到该服务器
    # interface_mac: "aa:bb:cc:dd:ee:ff"    # 可选，不填则使用第一块网卡

  # Scaleway Instance 安全组（VPS 防火墙）
  scaleway_vps:
    enabled: false
    provider: scaleway_security_group
    zone: "fr-par-1"              # 可用区，也可用 region 字段
    secret_key: "scw-secret-key"  # 控制台 API Keys 的 Secret Key
    security_group_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# 同一类型可配置多个实例（复制一段并改 name 即可）:
#  aliyun_swas_hk:
#    provider: aliyun_swas
#    enabled: true
#    region: "ap-southeast-1"
#    access_key_id: "LTAIxxx"
#    access_key_secret: "xxx"
#    instance_id: "another-id"

# ---------- 旧版单 backend 配置（仍兼容，勿与 targets 混用）----------
