services:
  firewallkeeper:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
      network: host
    image: ${IMAGE:-firewallkeeper:latest}
    container_name: FirewallKeeper
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HOME: /app
      CONFIG_PATH: /etc/FirewallKeeper/config.yaml
      STATE_FILE: /data/state.json
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID:-}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY:-}
      TENCENT_REGION: ${TENCENT_REGION:-}
      LIGHTHOUSE_INSTANCE_ID: ${LIGHTHOUSE_INSTANCE_ID:-}
      SECURITY_GROUP_ID: ${SECURITY_GROUP_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      ALIBABA_CLOUD_REGION: ${ALIBABA_CLOUD_REGION:-}
      ALIBABA_CLOUD_SWAS_INSTANCE_ID: ${ALIBABA_CLOUD_SWAS_INSTANCE_ID:-}
      ALIBABA_CLOUD_ENDPOINT: ${ALIBABA_CLOUD_ENDPOINT:-}
    volumes:
      - ${CONFIG_FILE:-./config.yaml}:/etc/FirewallKeeper/config.yaml:ro
      - firewallkeeper-data:/data
    # 首次启动初始化 volume 权限后，可改回 "1000:1000"
    user: "1000:1000"

volumes:
  firewallkeeper-data:
