name: Docker C++

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile.cpp"
      - "cpp/**"
      - "docker/**"
      - ".github/workflows/docker-cpp.yml"
  workflow_dispatch:
    inputs:
      push:
        description: Push multi-arch image to GHCR
        type: boolean
        default: false

env:
  TAG: cpp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Resolve build mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "load=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "load=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.push }}" = "true" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "load=false" >> "$GITHUB_OUTPUT"
          else
            # main/master push: publish multi-arch image to GHCR
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "load=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build C++ image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpp
          platforms: ${{ steps.mode.outputs.platforms }}
          push: ${{ steps.mode.outputs.push == 'true' }}
          load: ${{ steps.mode.outputs.load == 'true' }}
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:${{ env.TAG }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: steps.mode.outputs.load == 'true'
        run: |
          docker run --rm --entrypoint /usr/local/bin/FirewallKeeper \
            "${IMAGE}:${{ env.TAG }}-${{ github.sha }}" --help
