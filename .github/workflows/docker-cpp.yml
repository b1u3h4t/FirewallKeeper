name: Docker C++

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile.cpp"
      - "cpp/**"
      - "docker/**"
      - ".github/workflows/docker-cpp.yml"
  workflow_dispatch:
    inputs:
      push:
        description: Push multi-arch image to GHCR
        type: boolean
        default: false

env:
  TAG: cpp
  # 避免在 QEMU 下编译 AWS SDK（会失败/极慢）；各架构用原生 runner

jobs:
  # PR：仅 amd64 构建 + 冒烟测试（不推送）
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build (amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpp
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}-pr
          cache-from: type=gha,scope=cpp-amd64
          cache-to: type=gha,mode=max,scope=cpp-amd64

      - name: Smoke test
        run: |
          docker run --rm --entrypoint /usr/local/bin/FirewallKeeper \
            "${IMAGE}:${{ env.TAG }}-pr" --help

  # 推送场景：按架构原生构建，避免 buildx qemu
  build:
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpp
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=cpp-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cpp-${{ matrix.arch }}
          build-args: |
            JOBS=2

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -eux
          # 须用双引号展开 ${IMAGE}；单引号会把字面量 ${IMAGE}@sha256:... 传给 imagetools
          refs=()
          for digest in *; do
            refs+=("${IMAGE}@sha256:${digest}")
          done
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:${TAG}-${GITHUB_SHA}" \
            "${refs[@]}"
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
